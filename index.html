<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CrossClip</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#07070e;--s:rgba(255,255,255,.04);--sh:rgba(255,255,255,.07);--b:rgba(255,255,255,.08);--t:#e4e4e7;--td:#71717a;--a:#8b5cf6;--ag:rgba(139,92,246,.25);--g1:#22c55e;--r:16px;--rs:10px}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--t);min-height:100dvh;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
.glow{position:fixed;inset:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 40%,rgba(139,92,246,.07),transparent 50%),radial-gradient(circle at 70% 60%,rgba(59,130,246,.05),transparent 50%),radial-gradient(circle at 50% 90%,rgba(236,72,153,.04),transparent 40%);animation:gf 25s ease-in-out infinite;pointer-events:none;z-index:0}
@keyframes gf{0%,100%{transform:translate(0) rotate(0)}50%{transform:translate(2%,-1%) rotate(1deg)}}
.wrap{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:16px;min-height:100dvh;display:flex;flex-direction:column}
.screen{display:none;flex:1;flex-direction:column}.screen.on{display:flex;animation:fi .35s ease}
@keyframes fi{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* Logo */
.logo{text-align:center;padding:56px 0 36px}
.logo-i{width:64px;height:64px;background:linear-gradient(135deg,#8b5cf6,#3b82f6);border-radius:18px;display:inline-flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:16px;box-shadow:0 8px 32px var(--ag);position:relative}
.logo-i::after{content:'';position:absolute;inset:-3px;border-radius:21px;background:linear-gradient(135deg,rgba(139,92,246,.4),rgba(59,130,246,.2));z-index:-1;filter:blur(8px)}
.logo h1{font-size:28px;font-weight:800;background:linear-gradient(135deg,#fff 20%,#a5b4fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo p{color:var(--td);font-size:13px;margin-top:8px;line-height:1.6}

/* Cards */
.card{background:var(--s);border:1px solid var(--b);border-radius:var(--r);padding:24px;backdrop-filter:blur(16px);margin-bottom:14px}
.card-t{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--td);margin-bottom:16px;display:flex;align-items:center;gap:8px}

/* Inputs */
input,textarea{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--b);border-radius:var(--rs);padding:13px 14px;color:var(--t);font-family:inherit;font-size:15px;outline:none;transition:border .2s,box-shadow .2s}
input:focus,textarea:focus{border-color:var(--a);box-shadow:0 0 0 3px var(--ag)}
input::placeholder,textarea::placeholder{color:var(--td)}
textarea{resize:vertical;min-height:100px}
.fg{margin-bottom:14px}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 22px;border-radius:var(--rs);font-family:inherit;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:all .2s;width:100%;position:relative;overflow:hidden}
.btn:active{transform:scale(.98)}
.bp{background:linear-gradient(135deg,#8b5cf6,#6366f1);color:#fff;box-shadow:0 4px 16px var(--ag)}.bp:hover{transform:translateY(-1px);box-shadow:0 6px 28px var(--ag)}
.bs{background:var(--s);color:var(--t);border:1px solid var(--b)}.bs:hover{background:var(--sh)}
.bi{width:42px;height:42px;padding:0;border-radius:var(--rs);background:var(--s);border:1px solid var(--b);color:var(--t);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:15px;transition:all .2s;flex-shrink:0}.bi:hover{background:var(--sh);border-color:var(--a)}
.dv{display:flex;align-items:center;gap:14px;margin:18px 0;color:var(--td);font-size:11px;font-weight:600;letter-spacing:.05em}.dv::before,.dv::after{content:'';flex:1;height:1px;background:var(--b)}

/* Features */
.feats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:18px}
.feat{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);border-radius:10px;padding:14px 12px;text-align:center}
.feat .fi{font-size:20px;margin-bottom:6px}
.feat .ft{font-size:11px;font-weight:600;color:var(--td)}

/* Clipboard Screen */
.hbar{display:flex;align-items:center;justify-content:space-between;padding:12px 0 16px}
.hbar-l{display:flex;align-items:center;gap:10px}
.hbar h2{font-size:17px;font-weight:700}
.rbadge{background:rgba(139,92,246,.12);color:#a5b4fc;padding:4px 10px;border-radius:6px;font-size:13px;font-weight:700;font-family:'Courier New',monospace;letter-spacing:.1em}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.dot.on{background:var(--g1);animation:pu 2s ease-in-out infinite}
.dot.off{background:#ef4444}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.3}}
.conn-txt{font-size:10px;color:var(--td)}

.clips{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding-bottom:8px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent}
.clips::-webkit-scrollbar{width:4px}.clips::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}

.clip{background:var(--s);border:1px solid var(--b);border-radius:var(--rs);padding:14px;animation:si .3s ease;transition:all .2s;cursor:pointer;position:relative}
.clip:hover{border-color:rgba(255,255,255,.14);background:rgba(255,255,255,.05)}
.clip:active{transform:scale(.99)}
.clip.copied{border-color:rgba(34,197,94,.3) !important}
.clip.copied::after{content:'✓ Copied';position:absolute;top:10px;right:12px;font-size:10px;font-weight:700;color:var(--g1);animation:fi .2s ease}
@keyframes si{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.clip-txt{font-size:14px;line-height:1.65;word-break:break-word;white-space:pre-wrap;margin-bottom:10px;max-height:200px;overflow:hidden;position:relative}
.clip-txt.long::after{content:'';position:absolute;bottom:0;left:0;right:0;height:40px;background:linear-gradient(transparent,rgba(7,7,14,.95))}
.clip-m{display:flex;align-items:center;justify-content:space-between}
.clip-i{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--td)}
.clip-d{background:rgba(139,92,246,.12);color:#a5b4fc;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:700}
.clip-a{display:flex;gap:4px}
.clip-a button{width:30px;height:30px;padding:0;border-radius:7px;background:transparent;border:1px solid transparent;color:var(--td);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .15s}
.clip-a button:hover{background:var(--s);border-color:var(--b);color:var(--t)}
.clip-a .del:hover{color:#ef4444;border-color:rgba(239,68,68,.25)}

.empty{text-align:center;padding:48px 16px;color:var(--td);flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.empty .ei{font-size:48px;opacity:.4}
.empty p{font-size:13px;line-height:1.7}
.empty .ek{margin-top:4px;font-size:11px;background:rgba(255,255,255,.04);padding:6px 14px;border-radius:8px;display:inline-block}

/* Input Area */
.iarea{position:sticky;bottom:0;padding:10px 0 6px;background:linear-gradient(to top,var(--bg) 75%,transparent)}
.irow{display:flex;gap:8px;align-items:flex-end}
.irow textarea{flex:1;min-height:48px;max-height:120px;padding:12px 14px;resize:none;line-height:1.5;font-size:14px}
.sbtn{width:48px;height:48px;border-radius:var(--rs);background:linear-gradient(135deg,#8b5cf6,#6366f1);border:none;color:#fff;font-size:18px;cursor:pointer;transition:all .2s;flex-shrink:0;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px var(--ag)}
.sbtn:hover{transform:scale(1.05);box-shadow:0 6px 24px var(--ag)}
.sbtn:active{transform:scale(.96)}
.pbtn{width:48px;height:48px;border-radius:var(--rs);background:var(--s);border:1px solid var(--b);color:var(--t);font-size:16px;cursor:pointer;transition:all .2s;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.pbtn:hover{background:var(--sh);border-color:var(--a)}

/* File display */
.file-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(59,130,246,.12);color:#93c5fd;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;margin-bottom:8px}

/* Toast */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(16px);background:rgba(26,26,46,.95);color:#fff;padding:11px 24px;border-radius:12px;font-size:13px;font-weight:500;box-shadow:0 8px 32px rgba(0,0,0,.5);border:1px solid var(--b);opacity:0;transition:all .25s ease;z-index:99;pointer-events:none;white-space:nowrap;backdrop-filter:blur(12px)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Responsive */
@media(max-width:480px){.wrap{padding:10px}.logo{padding:36px 0 28px}.logo h1{font-size:24px}.logo-i{width:56px;height:56px;font-size:24px;border-radius:16px}.card{padding:18px}.feats{gap:6px}.feat{padding:12px 10px}}
</style>
</head>
<body>
<div class="glow"></div>
<div class="wrap">

<!-- ROOM SCREEN -->
<div id="S1" class="screen">
<div class="logo">
  <div class="logo-i">📋</div>
  <h1>CrossClip</h1>
  <p>Share clipboard instantly across<br>all your devices — any network</p>
</div>
<div class="card">
  <div class="card-t">🔗 Enter Room Code</div>
  <div class="fg"><input id="roomIn" placeholder="ROOM CODE" maxlength="20" style="text-align:center;font-size:24px;font-weight:800;letter-spacing:.14em;font-family:'Courier New',monospace;text-transform:uppercase;padding:16px" autocomplete="off" spellcheck="false"></div>
  <button class="btn bp" onclick="joinRoom()">Join Room →</button>
  <div class="dv">OR</div>
  <button class="btn bs" onclick="genRoom()">🎲 Generate Random Room</button>
</div>
<div class="feats">
  <div class="feat"><div class="fi">⚡</div><div class="ft">Real-time Sync</div></div>
  <div class="feat"><div class="fi">🌐</div><div class="ft">Any Network</div></div>
  <div class="feat"><div class="fi">📱</div><div class="ft">Phone + Desktop</div></div>
  <div class="feat"><div class="fi">🔒</div><div class="ft">Room-based</div></div>
</div>
</div>

<!-- CLIPBOARD SCREEN -->
<div id="S2" class="screen">
<div class="hbar">
  <div class="hbar-l">
    <button class="bi" onclick="leave()" title="Leave room">←</button>
    <div>
      <h2>CrossClip</h2>
      <div style="display:flex;align-items:center;gap:6px;margin-top:3px">
        <span id="dotEl" class="dot off"></span>
        <span class="rbadge" id="rBadge"></span>
        <span id="connSt" class="conn-txt">connecting…</span>
      </div>
    </div>
  </div>
  <div style="display:flex;gap:6px">
    <button class="bi" onclick="shareRoom()" title="Share room">🔗</button>
    <button class="bi" onclick="clearAll()" title="Clear all">🗑</button>
  </div>
</div>

<div class="clips" id="clipList"></div>
<div id="emptyS" class="empty">
  <div class="ei">📭</div>
  <p>No clips yet.<br>Type or paste something below!</p>
  <div class="ek">Same room code on another device to sync</div>
</div>

<div class="iarea">
  <div class="irow">
    <button class="pbtn" onclick="pasteClip()" title="Paste from clipboard">📋</button>
    <textarea id="clipIn" placeholder="Type or paste here…" rows="1"></textarea>
    <button class="sbtn" onclick="send()" title="Send">↑</button>
  </div>
</div>
</div>

</div>
<div id="toast" class="toast"></div>

<script>
// ─── Firebase Config (hardcoded) ───
const firebaseConfig = {
  apiKey: "AIzaSyCtc_uuFywULsusM0QRSZKlOuupRs_MslI",
  authDomain: "cross-copier.firebaseapp.com",
  databaseURL: "https://cross-copier-default-rtdb.firebaseio.com",
  projectId: "cross-copier",
  storageBucket: "cross-copier.firebasestorage.app",
  messagingSenderId: "97525567812",
  appId: "1:97525567812:web:6cca06ed1dae258d368711"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let room, ref, cmap = {};
const dev = /Mobi|Android|iPhone/i.test(navigator.userAgent) ? '📱 Phone' : '💻 Desktop';

// ─── Screens ───
const show = id => {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
};

const toast = m => {
  const t = document.getElementById('toast');
  t.textContent = m;
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), 2400);
};

// ─── Connection Status ───
db.ref('.info/connected').on('value', s => {
  const on = s.val();
  const dot = document.getElementById('dotEl');
  const txt = document.getElementById('connSt');
  if (dot) { dot.className = 'dot ' + (on ? 'on' : 'off'); }
  if (txt) { txt.textContent = on ? 'connected' : 'reconnecting…'; }
});

// ─── Room ───
function genRoom() {
  const c = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789';
  let r = '';
  for (let i = 0; i < 6; i++) r += c[Math.floor(Math.random() * c.length)];
  document.getElementById('roomIn').value = r;
  joinRoom();
}

function joinRoom() {
  const c = document.getElementById('roomIn').value.trim().toUpperCase().replace(/[^A-Z0-9]/g, '');
  if (!c) return toast('⚠️ Enter a room code');
  room = c;
  localStorage.setItem('cc_room', c);
  document.getElementById('rBadge').textContent = c;
  show('S2');
  listen();
  toast('🔗 Joined room: ' + c);
  setTimeout(() => document.getElementById('clipIn').focus(), 300);
}

function leave() {
  if (ref) ref.off();
  ref = null;
  room = null;
  cmap = {};
  document.getElementById('clipList').innerHTML = '';
  show('S1');
}

function shareRoom() {
  const url = location.href.split('?')[0] + '?room=' + room;
  navigator.clipboard.writeText(url).then(() => toast('🔗 Room link copied!')).catch(() => {
    navigator.clipboard.writeText(room).then(() => toast('📋 Room code copied!'));
  });
}

// ─── Listen for clips ───
function listen() {
  const list = document.getElementById('clipList');
  const emp = document.getElementById('emptyS');
  if (ref) ref.off();
  ref = db.ref('crossclip/' + room);
  ref.orderByChild('ts').on('value', snap => {
    list.innerHTML = '';
    cmap = {};
    const arr = [];
    snap.forEach(ch => arr.push({ id: ch.key, ...ch.val() }));
    arr.reverse();
    emp.style.display = arr.length ? 'none' : 'flex';
    arr.forEach(c => {
      cmap[c.id] = c.text;
      list.appendChild(mkClip(c));
    });
  });
}

function mkClip(c) {
  const d = document.createElement('div');
  d.className = 'clip';
  d.id = 'clip-' + c.id;
  const long = c.text.length > 400;
  const isUrl = /^https?:\/\/\S+$/i.test(c.text.trim());

  let content = esc(c.text);
  if (isUrl) {
    content = `<a href="${esc(c.text.trim())}" target="_blank" rel="noopener" style="color:#93c5fd;text-decoration:underline;word-break:break-all">${esc(c.text.trim())}</a>`;
  }

  d.innerHTML = `
    <div class="clip-txt${long ? ' long' : ''}" onclick="cpy('${c.id}')">${content}</div>
    <div class="clip-m">
      <div class="clip-i">
        <span class="clip-d">${c.dev || '📱'}</span>
        <span>${ago(c.ts)}</span>
        <span>· ${(c.text || '').length} chars</span>
      </div>
      <div class="clip-a">
        <button onclick="cpy('${c.id}')" title="Copy">📋</button>
        <button class="del" onclick="del('${c.id}')" title="Delete">✕</button>
      </div>
    </div>`;
  return d;
}

// ─── Send ───
function send() {
  const inp = document.getElementById('clipIn');
  const t = inp.value.trim();
  if (!t) return;
  ref.push({ text: t, ts: firebase.database.ServerValue.TIMESTAMP, dev });
  inp.value = '';
  inp.style.height = 'auto';
  toast('✅ Shared!');
}

async function pasteClip() {
  try {
    const t = await navigator.clipboard.readText();
    if (t && t.trim()) {
      ref.push({ text: t.trim(), ts: firebase.database.ServerValue.TIMESTAMP, dev });
      toast('📋 Pasted & shared!');
    } else {
      toast('📋 Clipboard is empty');
    }
  } catch {
    toast('⚠️ Allow clipboard access in browser settings');
  }
}

// ─── Copy ───
function cpy(id) {
  const t = cmap[id];
  if (!t) return;
  const el = document.getElementById('clip-' + id);

  navigator.clipboard.writeText(t).then(() => {
    toast('📋 Copied!');
    if (el) { el.classList.add('copied'); setTimeout(() => el.classList.remove('copied'), 1500); }
  }).catch(() => {
    // Fallback
    const a = document.createElement('textarea');
    a.value = t;
    a.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(a);
    a.select();
    document.execCommand('copy');
    document.body.removeChild(a);
    toast('📋 Copied!');
    if (el) { el.classList.add('copied'); setTimeout(() => el.classList.remove('copied'), 1500); }
  });
}

function del(id) { ref.child(id).remove(); }

function clearAll() {
  if (confirm('Clear all clips in this room?')) {
    ref.remove();
    toast('🗑️ Room cleared');
  }
}

// ─── Utils ───
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function ago(ts) {
  if (!ts) return '';
  const d = Math.floor((Date.now() - ts) / 1e3);
  if (d < 5) return 'just now';
  if (d < 60) return d + 's ago';
  if (d < 3600) return Math.floor(d / 60) + 'm ago';
  if (d < 86400) return Math.floor(d / 3600) + 'h ago';
  return Math.floor(d / 86400) + 'd ago';
}

// ─── Auto-resize textarea ───
const ta = document.getElementById('clipIn');
ta.addEventListener('input', () => {
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
});
ta.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

// Room input — Enter to join
document.getElementById('roomIn').addEventListener('keydown', e => {
  if (e.key === 'Enter') joinRoom();
});

// ─── Init: check URL param or localStorage ───
(function init() {
  const params = new URLSearchParams(location.search);
  const urlRoom = params.get('room');
  const savedRoom = localStorage.getItem('cc_room');

  if (urlRoom) {
    document.getElementById('roomIn').value = urlRoom.toUpperCase();
    joinRoom();
  } else if (savedRoom) {
    document.getElementById('roomIn').value = savedRoom;
    show('S1'); // still show room screen so user confirms
  } else {
    show('S1');
  }
})();
</script>
</body>
</html>
